name: Fetch Cyber News

on:
  schedule:
    # Weekdays — every 30 min, 8am–7pm AEST (UTC+10)
    - cron: '*/30 22-8 * * 0-4'
    # Weekends — every 6 hours
    - cron: '0 */6 * * 5,6'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run fetch script
        run: python fetch_cyber_news.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json tool_updates.json
          git diff --staged --quiet || git commit -m "chore: update news feed [$(date '+%d-%m-%Y %H:%M') AEST]"
          git push
